<!doctype html>
<html lang="ua">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MALytics</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="lang/en.js"></script>
  <script src="lang/ua.js"></script>
</head>
<body>
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
    <button class="lang-btn" data-lang="ua" onclick="setLanguage('ua')">UA</button>
  </div>
  <main class="container">
    <h1>MAL<span>ytics</span></h1>
    <p class="hint" lang="subtitle"></p>
     <div class="type-toggle">
        <input type="radio" id="type-anime" name="search_type" value="anime" checked>
        <input type="radio" id="type-manga" name="search_type" value="manga">
        <label for="type-anime" lang="typeAnime"></label>
        <label for="type-manga" lang="typeManga"></label>
        <div class="slider"></div>
    </div>

    <div class="form-row">
      <input id="inputUser" type="text" lang="placeholder">
       <button id="btnFetch" lang="btnFetch"></button>
    </div>
    <div id="status" class="status"></div>
    <div id="result" class="result"></div>
    <div class="analyze-container">
        <button id="btnAnalyze" class="btn-analyze" disabled>
            <i class="ph-fill ph-flask pulse-icon"></i>
            <span lang="btnAnalyze"></span>
        </button>
    </div>
  </main>
  <div id="recommendations" class="rec-container" style="display: none;"></div>
  <footer class="footer">
    <div class="footer-inner" lang="footerText"></div>
  </footer>

  <script>
  const input = document.getElementById('inputUser');
  const btn = document.getElementById('btnFetch');
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  const btnAnalyze = document.getElementById('btnAnalyze');
  const recommendationsDiv = document.getElementById('recommendations');
  let currentData = null;

  const defaultToggle = document.getElementById('type-anime');
  if (defaultToggle) {
      defaultToggle.checked = true;
  }
  let currentType = 'anime';
  document.body.classList.remove('theme-manga');

  document.querySelectorAll('input[name="search_type"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
          currentType = e.target.value;
          if (currentType === 'manga') {
              document.body.classList.add('theme-manga');
          } else {
              document.body.classList.remove('theme-manga');
          }
          btnAnalyze.disabled = true;
          result.innerHTML = '';
          recommendationsDiv.style.display = 'none';
      });
  });

  const translations = {
    en: typeof langEN !== 'undefined' ? langEN : {},
    ua: typeof langUA !== 'undefined' ? langUA : {}
  };

  let currentLang = localStorage.getItem('site_lang') || 'en';
  function t(key) {
      return translations[currentLang][key] || ke
      y;
  }
  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('site_lang', lang);
    document.documentElement.lang = lang;
    const dictionary = translations[lang];
    document.querySelectorAll('[lang]:not(html)').forEach(el => {
        const key = el.getAttribute('lang');
        if (dictionary[key]) {
            if (el.tagName === 'INPUT') {
                el.placeholder = dictionary[key];
            } else {
                el.innerHTML = dictionary[key];
            }
        }
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
        if (btn.getAttribute('data-lang') === lang) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });

    if (currentData) renderList(currentData);
  }

  document.addEventListener('DOMContentLoaded', () => {
    setLanguage(currentLang);
  });

  function extractUsername(value){
    value = value.trim();
    if(!value) return '';
    try{
      const u = new URL(value);
      const parts = u.pathname.split('/').filter(Boolean);
      const idx = parts.findIndex(p => p === 'profile' || p === 'animelist' || p === 'users');
      if(idx >= 0 && parts.length > idx+1) return parts[idx+1];
      return parts[parts.length-1] || '';
    }catch(e){
      return value.split('/').filter(Boolean).pop();
    }
  }

function renderList(data){
      result.innerHTML = '';
      if(!data) return;
      const header = document.createElement('div');
      header.className = 'summary';
      const avatarHtml = data.picture ? `<img src="${data.picture}" alt="Avatar" class="profile-avatar">` : '';
      header.innerHTML = `<span class="summary-inline">${t('profile')}: ${avatarHtml} <strong>${data.username}</strong> — ${t('found')}: ${data.total}</span>`;
      result.appendChild(header);
      const ul = document.createElement('ul');
      ul.className = 'anime-list';
      
      const fragment = document.createDocumentFragment();
      const sortlist = [...data.list].sort((a,b) => b.score - a.score);
      
      sortlist.forEach(item => {
        const displayGenres = (item.genres || []).map(g => {
            if (currentLang === 'ua' && typeof genreTranslations !== 'undefined' && genreTranslations[g]) {
                return genreTranslations[g];
            }
            return g; 
        });
        const li = document.createElement('li');
        li.innerHTML = `
          <div>
            <strong>${item.title}</strong>
            <span class="genres">${displayGenres.join(', ')}</span>
          </div>
          <span class="score-badge">${item.score}/10</span>
        `;
        fragment.appendChild(li);
      });
      
      ul.appendChild(fragment);
      result.appendChild(ul);
  }

  input.addEventListener('input', () => {
      btnAnalyze.disabled = true;
  });

  async function fetchList(){
    const raw = input.value;
    const username = extractUsername(raw);
    if(!username){ status.textContent = t('enterUsernameError'); return; }
    status.innerHTML = `<div class="spinner"></div><span>${t('loading')}</span>`;
    result.innerHTML = '';
    recommendationsDiv.style.display = 'none';
    btnAnalyze.disabled = true;
    currentData = null;

    try{
      const url = `${window.location.origin}/get_list?username=${encodeURIComponent(username)}&type=${currentType}`;
      const resp = await fetch(url);
      if(!resp.ok){
        status.textContent = `${t('serverError')}: ${resp.status}`;
        return;
      }
      const data = await resp.json();
      currentData = data;
      status.textContent = '';
      renderList(data);
      btnAnalyze.disabled = false;
    }catch(err){
      status.textContent = t('connectionError');
      console.error(err);
    }
  }

  async function translateText(text) {
      if (!text || text === 'Опис відсутній.') return text;
      if (currentLang === 'en') return text;
      try {
          const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=uk&dt=t&q=${encodeURIComponent(text)}`);
          const data = await res.json();
          return data[0].map(item => item[0]).join('');
      } catch(e) {
          console.error('Translation error', e);
          return text;
      }
  }

  btnAnalyze.addEventListener('click', async () => {
    if(!currentData || !currentData.username) return;
    
    const originalBtnText = btnAnalyze.innerHTML;
    btnAnalyze.innerHTML = `<div class="spinner"></div> <span>${t('analyzing')}</span>`;
    btnAnalyze.disabled = true;

    recommendationsDiv.style.display = 'none';
    
    try {
        const url = `${window.location.origin}/get_recommendations?username=${encodeURIComponent(currentData.username)}&type=${currentType}`;
        const resp = await fetch(url);
        
        if (!resp.ok) throw new Error('Server error');
        
        const data = await resp.json();
        const recs = data.recommendations;

        if (!recs || recs.length === 0) {
            alert(t('noRecsError'));
            btnAnalyze.innerHTML = originalBtnText;
            btnAnalyze.disabled = false;
            return;
        }

        recommendationsDiv.style.display = 'block';
        recommendationsDiv.innerHTML = `<h2 class="rec-title"><span>///</span> ${t('personalRecs')}</h2>`;
        
        const grid = document.createElement('div');
        grid.className = 'rec-grid';
        
        for (const item of recs) {
            const translatedSynopsis = await translateText(item.synopsis);            
            const displayGenres = (item.genres || []).map(g => {
                if (currentLang === 'ua' && typeof genreTranslations !== 'undefined' && genreTranslations[g]) {
                    return genreTranslations[g];
                }
                return g;
            });
            const tagsHtml = displayGenres.slice(0, 3).map(g => `<span class="rec-tag">${g}</span>`).join('');

            const card = document.createElement('div');
            card.className = 'rec-card';
            card.innerHTML = `
                <div class="rec-img-wrapper">
                    <img src="${item.picture}" alt="${item.title}">
                    <div class="rec-badge-left">#${item.rank}</div>
                    <div class="rec-badge">${Math.round((item.matchScore / 25) * 100)}% ${t('match')}</div>
                </div>
                <div class="rec-content">
                    <div class="rec-tags">${tagsHtml}</div>
                    <h3 class="rec-title-card">${item.title}</h3>
                    <p class="rec-desc" title="${translatedSynopsis}">${translatedSynopsis}</p>
                    <a href="https://myanimelist.net/${currentType}/${item.id}" target="_blank" class="rec-link">
                        ${t('watchOnMAL')}
                    <i class="ph-bold ph-arrow-square-out" style="font-size: 1.25rem;"></i>
                    </a>
                </div>
            `;
            grid.appendChild(card);
        }
        
        recommendationsDiv.appendChild(grid);
        recommendationsDiv.scrollIntoView({ behavior: 'smooth' });

    } catch (error) {
        console.error(error);
        alert(t('recFetchError'));
    } finally {
        btnAnalyze.innerHTML = originalBtnText;
        btnAnalyze.disabled = false;
    }
  });

  btn.addEventListener('click', fetchList);
  input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') fetchList(); });
  </script>
</body>
</html>
